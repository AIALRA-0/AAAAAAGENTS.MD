<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AGENTS 可视化工作台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app.css?v={{ asset_version }}" rel="stylesheet">
</head>
<body>
  <main class="app-shell container-fluid">
    <header class="top-toolbar">
      <div>
        <h1>AGENTS 可视化工作台</h1>
        <p>默认预览模式，流程图节点点击可直接查看结构化详情</p>
      </div>
      <div class="toolbar-actions">
        <button id="sync-tree-btn" type="button" class="btn btn-light">同步TREE</button>
        <button id="verify-btn" type="button" class="btn btn-light">终检校验</button>
        <button id="baseline-btn" type="button" class="btn btn-outline-light">同步终检基线</button>
      </div>
    </header>
    <section class="main-grid">
      <aside class="panel">
        <div class="panel-head">
          <h2 class="panel-title">文档导航</h2>
          <span id="doc-count" class="status-pill">0 文件</span>
        </div>
        <div class="panel-body doc-tree-wrap" id="nav-tree"></div>
      </aside>
      <section class="workspace">
        <div class="status-line">
          <span id="doc-state-pill" class="status-pill">未加载文档</span>
          <span id="runtime-status" class="status-pill">系统就绪</span>
        </div>
        <article id="graph-panel" class="panel hidden">
          <div class="panel-head">
            <h2 class="panel-title">流程图预览</h2>
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <button id="graph-mode-graph-btn" type="button" class="btn btn-sm btn-outline-primary active">图模式</button>
              <button id="graph-mode-list-btn" type="button" class="btn btn-sm btn-outline-primary">列表模式</button>
              <button id="graph-save-layout-btn" type="button" class="btn btn-sm btn-outline-primary">保存布局</button>
              <button id="graph-fit-btn" type="button" class="btn btn-sm btn-outline-primary">重置视图</button>
            </div>
          </div>
          <div class="panel-body">
            <div id="graph-view-wrap" class="visual-grid">
              <div class="canvas-wrap"><div id="graph-canvas"></div></div>
              <aside id="graph-detail" class="detail-wrap"></aside>
            </div>
            <div id="graph-list-wrap" class="hidden">
              <div class="list-detail-grid">
                <div id="graph-list" class="node-list"></div>
                <aside id="graph-list-detail" class="detail-wrap"></aside>
              </div>
            </div>
          </div>
        </article>
        <article id="tree-panel" class="panel hidden">
          <div class="panel-head"><h2 class="panel-title">TREE 结构浏览</h2></div>
          <div class="panel-body"><div class="tree-grid"><div id="tree-explorer" class="tree-explorer"></div><aside id="tree-detail" class="tree-detail"></aside></div></div>
        </article>
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2 id="doc-title" class="panel-title">文档预览</h2>
              <div id="doc-meta" class="doc-meta"></div>
            </div>
            <div class="edit-actions">
              <button id="toggle-mode-btn" type="button" class="btn btn-outline-primary">进入编辑</button>
            </div>
          </div>
          <div class="panel-body"><article id="doc-html" class="preview-wrap"></article></div>
        </article>
        <article id="edit-panel" class="panel hidden">
          <div class="panel-head">
            <h2 class="panel-title">编辑模式</h2>
            <div class="edit-actions">
              <button id="save-raw-btn" type="button" class="btn btn-primary">保存原文</button>
              <button id="save-node-btn" type="button" class="btn btn-primary">保存节点</button>
              <button id="reset-btn" type="button" class="btn btn-outline-danger">重置文档</button>
            </div>
          </div>
          <div class="panel-body">
            <ul class="nav nav-tabs mb-3" role="tablist">
              <li class="nav-item"><button id="tab-raw-btn" class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-raw" type="button">原文编辑</button></li>
              <li id="tab-node-item" class="nav-item"><button id="tab-node-btn" class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-node" type="button">节点编辑</button></li>
            </ul>
            <div class="tab-content edit-zone">
              <div class="tab-pane fade show active" id="tab-raw"><textarea id="raw-editor" spellcheck="false"></textarea></div>
              <div class="tab-pane fade" id="tab-node">
                <div class="node-toolbar">
                  <div class="text-muted small">节点列表</div>
                  <div id="milestone-node-actions" class="d-flex gap-2 hidden">
                    <button id="node-create-btn" type="button" class="btn btn-outline-primary btn-sm">新建节点</button>
                    <button id="node-delete-btn" type="button" class="btn btn-outline-danger btn-sm">删除节点</button>
                  </div>
                </div>
                <div id="node-list" class="node-list"></div>
                <form id="node-form" class="node-form"></form>
              </div>
            </div>
          </div>
        </article>
      </section>
    </section>
  </main>

  <div class="modal fade" id="action-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="action-modal-title" class="modal-title">操作确认</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p id="action-modal-body" class="mb-2"></p>
          <input id="action-modal-input" type="text" class="form-control hidden" />
        </div>
        <div class="modal-footer">
          <button id="action-modal-cancel" type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">取消</button>
          <button id="action-modal-confirm" type="button" class="btn btn-primary">确认</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="verify-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">终检详情</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="verify-modal-summary" class="mb-3"></div>
          <div class="mb-3">
            <h6 class="small text-muted">错误列表</h6>
            <ul id="verify-modal-errors" class="mb-0"></ul>
          </div>
          <div>
            <h6 class="small text-muted">修复建议</h6>
            <ul id="verify-modal-hints" class="mb-0"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-region" class="toast-container"></div>

  <script>
    window.__INITIAL_TREE__ = {{ docs_tree | tojson }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <script defer src="/static/app.js?v={{ asset_version }}"></script>
</body>
</html>
